<style>
  html, body { margin: 0; padding: 0; background: #0B0B0E; font-family: 'Inter Tight', system-ui, sans-serif; color: #F4F2ED; overflow: hidden; height: 100vh; }
  * { box-sizing: border-box; }
  ::-webkit-scrollbar { width: 0; height: 0; }
  button { font-family: inherit; }
  .sb-stage {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background:
      radial-gradient(ellipse 60% 50% at 30% 20%, oklch(0.2 0.06 60 / 0.25) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 80% 80%, oklch(0.22 0.08 280 / 0.2) 0%, transparent 60%),
      #0B0B0E;
    padding: 24px; position: relative;
  }
  .sb-stage::before {
    content: ''; position: absolute; inset: 0;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence baseFrequency='0.85' numOctaves='2'/></filter><rect width='160' height='160' filter='url(%23n)' opacity='0.35'/></svg>");
    opacity: 0.04; pointer-events: none;
  }
  .sb-watermark {
    position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
    color: rgba(244,242,237,0.28); font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
  }
  .sb-ribbon {
    position: absolute; top: 22px; left: 24px;
    color: rgba(244,242,237,0.4); font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 2.2px; text-transform: uppercase;
    display: flex; gap: 10px; align-items: center;
  }
  .sb-ribbon .dot { width: 6px; height: 6px; border-radius: 3px; background: oklch(0.82 0.13 78); box-shadow: 0 0 10px oklch(0.82 0.13 78); }

  /* Tweaks panel */
  .sb-tweaks {
    position: fixed; bottom: 20px; right: 20px; z-index: 9999;
    background: rgba(16,16,19,0.92); backdrop-filter: blur(22px) saturate(180%);

    font-family: 'Inter Tight', sans-serif;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5); display: none;
  }
  .sb-tweaks.open { display: block; }
  .sb-tweaks-title { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: rgba(244,242,237,0.4); font-weight: 500; margin-bottom: 10px; }
  .sb-tweaks-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
  .sb-tweaks-row:last-child { margin-bottom: 0; }
  .sb-tweaks-row .lbl { font-size: 11px; color: rgba(244,242,237,0.6); letter-spacing: 0.5px; width: 100%; margin-bottom: 2px; }
  .sb-tweaks button {
    padding: 6px 10px; border-radius: 8px;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08);
    color: #F4F2ED; font-size: 11px; cursor: pointer;
  }
  .sb-tweaks button.active { background: oklch(0.82 0.13 78); color: #0B0B0E; border-color: transparent; font-weight: 600; }

<script src="c3db3558-c363-4aa7-92a7-9879637fbf1c" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

<script type="text/babel" src="94984bdf-9074-4923-baf9-444666a4dd07"></script>
<script type="text/babel" src="d2d84e83-3e8f-495d-aacb-d9daa35bb95e"></script>
<script type="text/babel" src="f18ca870-ba46-471e-8e6b-43419d63527e"></script>

<script type="text/babel" data-presets="react">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "screen": "home",
  "accent": "gold",
  "header": "sans"
}/*EDITMODE-END*/;

// Accent palettes
const ACCENTS = {
  gold: { gold: 'oklch(0.82 0.13 78)', goldDim: 'oklch(0.58 0.09 75)', goldInk: 'oklch(0.32 0.07 72)' },
  emerald: { gold: 'oklch(0.78 0.14 155)', goldDim: 'oklch(0.55 0.1 155)', goldInk: 'oklch(0.3 0.08 150)' },
  platinum: { gold: 'oklch(0.88 0.015 240)', goldDim: 'oklch(0.65 0.015 240)', goldInk: 'oklch(0.25 0.01 240)' },
  ember: { gold: 'oklch(0.72 0.18 35)', goldDim: 'oklch(0.5 0.14 30)', goldInk: 'oklch(0.3 0.1 30)' },
};

// Bottom tab bar
function SBTabBar({ active, onSelect }) {
  const tabs = [
    { k: 'home', icon: 'home', l: 'Home' },
    { k: 'collection', icon: 'grid', l: 'Vault' },
    { k: 'scan', icon: 'scan', l: 'Scan', primary: true },
    { k: 'search', icon: 'search', l: 'Search' },
    { k: 'profile', icon: 'user', l: 'Profile' },
  ];
  return (
    <div style={{
      position: 'absolute', bottom: 0, left: 0, right: 0, zIndex: 80,
      paddingBottom: 18, paddingTop: 6,
      background: 'linear-gradient(180deg, transparent, rgba(11,11,14,0.94) 40%)',
    }}>
      <div style={{
        margin: '0 12px', background: 'rgba(20,20,23,0.82)', backdropFilter: 'blur(28px) saturate(180%)',
        border: '1px solid ' + SB_TOKENS.hairlineStrong, borderRadius: 28, padding: 6,
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
      }}>
        {tabs.map(t => {
          const isActive = active === t.k;
          if (t.primary) {
            return (
              <button key={t.k} onClick={() => onSelect(t.k)} style={{
                width: 56, height: 44, borderRadius: 22,
                background: `linear-gradient(135deg, ${SB_TOKENS.gold}, oklch(0.72 0.13 60))`,
                border: 'none', display: 'flex', alignItems: 'center', justifyContent: 'center',
                color: SB_TOKENS.ink, cursor: 'pointer',
                boxShadow: `0 6px 18px ${SB_TOKENS.gold}44`,
              }}><SBIcon name="scan" size={22} strokeWidth={2}/></button>
            );
          }
          return (
            <button key={t.k} onClick={() => onSelect(t.k)} style={{
              flex: 1, height: 44, border: 'none', background: 'transparent',
              display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 2,
              color: isActive ? SB_TOKENS.gold : SB_TOKENS.dim, cursor: 'pointer',
            }}>
              <SBIcon name={t.icon} size={20} strokeWidth={isActive ? 2.1 : 1.7}/>
              <span style={{ fontSize: 9, letterSpacing: 1, textTransform: 'uppercase', fontWeight: 500 }}>{t.l}</span>
            </button>
          );
        })}
      </div>
    </div>
  );
}

function PhoneFrame({ children, dark = true }) {
  return (
    <div style={{
      width: 402, height: 874, borderRadius: 56, position: 'relative', overflow: 'hidden',
      background: dark ? '#000' : '#F2F2F7',
      boxShadow: '0 60px 140px rgba(0,0,0,0.65), 0 0 0 2px #111, 0 0 0 8px #1a1a1d, 0 0 0 9px #2a2a2e',
      fontFamily: SB_TOKENS.sans, WebkitFontSmoothing: 'antialiased',
    }}>
      {/* dynamic island */}
      <div style={{
        position: 'absolute', top: 11, left: '50%', transform: 'translateX(-50%)',
        width: 126, height: 37, borderRadius: 24, background: '#000', zIndex: 90,
      }} />
      {children}
      {/* home indicator */}
      <div style={{
        position: 'absolute', bottom: 8, left: '50%', transform: 'translateX(-50%)',
        width: 139, height: 5, borderRadius: 3,
        background: 'rgba(255,255,255,0.55)', zIndex: 100,
      }}/>
    </div>
  );
}

function App() {
  const [tweaks, setTweaks] = React.useState(TWEAK_DEFAULTS);
  const [editMode, setEditMode] = React.useState(false);
  const [screen, setScreen] = React.useState(tweaks.screen || 'home');
  const [activeCard, setActiveCard] = React.useState(SB_CARDS[8]);
  const [batchResult, setBatchResult] = React.useState(null);

  // Apply accent to tokens
  React.useEffect(() => {
    const acc = ACCENTS[tweaks.accent] || ACCENTS.gold;
    SB_TOKENS.gold = acc.gold;
    SB_TOKENS.goldDim = acc.goldDim;
    SB_TOKENS.goldInk = acc.goldInk;
    // force rerender
    setScreen(s => s);
  }, [tweaks.accent]);

  // Sync screen -> tweaks
  React.useEffect(() => {
    if (screen !== tweaks.screen && ['home','collection','scan','search','profile','onboarding','detail','chart'].includes(screen)) {
      const nt = { ...tweaks, screen };
      setTweaks(nt);
      window.parent?.postMessage({ type: '__edit_mode_set_keys', edits: { screen } }, '*');
    }
  }, [screen]);

  // Tweak protocol
  React.useEffect(() => {
    function onMsg(e) {
      if (e.data?.type === '__activate_edit_mode') setEditMode(true);
      if (e.data?.type === '__deactivate_edit_mode') setEditMode(false);
    }
    window.addEventListener('message', onMsg);
    window.parent?.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  // Hook up the tweaks DOM panel
  React.useEffect(() => {
    document.getElementById('tweaks').classList.toggle('open', editMode);

    const setTw = (k, v) => {
      const nt = { ...tweaks, [k]: v };
      setTweaks(nt);
      if (k === 'screen') setScreen(v);
      window.parent?.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*');
    };

    // Screens
    const screensEl = document.getElementById('tw-screens');
    const screensList = [
      ['onboarding','Onboard'], ['home','Home'], ['scan','Scan'],
      ['collection','Vault'], ['detail','Detail'], ['chart','Chart'],
      ['search','Search'], ['profile','Profile'],
    ];
    screensEl.innerHTML = '';
    screensList.forEach(([k, l]) => {
      const b = document.createElement('button');
      b.textContent = l;
      b.className = screen === k ? 'active' : '';
      b.onclick = () => setTw('screen', k);
      screensEl.appendChild(b);
    });

    // Accent
    const accentEl = document.getElementById('tw-accent');
    accentEl.innerHTML = '';
    ['gold','emerald','platinum','ember'].forEach(k => {
      const b = document.createElement('button');
      b.textContent = k[0].toUpperCase() + k.slice(1);
      b.className = tweaks.accent === k ? 'active' : '';
      b.onclick = () => setTw('accent', k);
      accentEl.appendChild(b);
    });

    // Header
    const headerEl = document.getElementById('tw-header');
    headerEl.innerHTML = '';
    [['serif','Editorial'],['sans','Modern']].forEach(([k, l]) => {
      const b = document.createElement('button');
      b.textContent = l;
      b.className = tweaks.header === k ? 'active' : '';
      b.onclick = () => setTw('header', k);
      headerEl.appendChild(b);
    });
  }, [editMode, tweaks, screen]);

  // Font family override based on header style
  const titleFont = tweaks.header === 'sans' ? SB_TOKENS.sans : SB_TOKENS.serif;
  const prevSerif = React.useRef(SB_TOKENS.serif);
  React.useEffect(() => {
    SB_TOKENS.serif = tweaks.header === 'sans'
      ? '"Inter Tight", sans-serif'
      : '"Instrument Serif", Georgia, serif';
    setScreen(s => s);
  }, [tweaks.header]);

  const openCard = c => { setActiveCard(c); setScreen('detail'); };
  const openChart = () => setScreen('chart');
  const backFromDetail = () => setScreen('collection');
  const backFromChart = () => setScreen('detail');

  let content;
  if (screen === 'onboarding') {
    content = <SBOnboarding onFinish={() => setScreen('home')}/>;
  } else if (screen === 'home') {
    content = <SBHome onOpenCard={openCard} onOpenScan={() => setScreen('scan')}/>;
  } else if (screen === 'scan') {
    content = <SBScan
      onClose={() => setScreen('home')}
      onBatchDone={(cards) => { setBatchResult(cards); setScreen('batch-result'); }}
    />;
  } else if (screen === 'batch-result') {
    content = <SBBatchResult cards={batchResult || SB_CARDS.slice(0, 5)} onDone={() => setScreen('collection')} onOpenCard={openCard}/>;
  } else if (screen === 'collection') {
    content = <SBCollection onOpenCard={openCard}/>;
  } else if (screen === 'detail') {
    content = <SBCardDetail card={activeCard} onBack={backFromDetail} onOpenChart={openChart}/>;
  } else if (screen === 'chart') {
    content = <SBPriceChart card={activeCard} onBack={backFromChart}/>;
  } else if (screen === 'search') {
    content = <SBSearch onOpenCard={openCard}/>;
  } else if (screen === 'profile') {
    content = <SBProfile/>;
  }

  const showTabBar = !['onboarding', 'scan'].includes(screen);
  const tabActive = ({ 'home':'home','collection':'collection','scan':'scan','search':'search','profile':'profile','detail':'collection','chart':'collection','batch-result':'collection' })[screen] || 'home';

  return (
    <PhoneFrame>
      {content}
      {showTabBar && <SBTabBar active={tabActive} onSelect={setScreen}/>}
    </PhoneFrame>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
